<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Al Haktak AI</h1>
            <p class="subtitle">Powered by Groq</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message bot">
                <span class="avatar">🤖</span>
                <div class="bubble">
                    Assalamu alaykum! Ask me anything about Discord.
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>

        <div class="divider"></div>

        <div class="settings-area">
            <div class="setting-row">
                <span>🎨 Theme Colors</span>
                <button id="updateColorsBtn">Update</button>
            </div>
            <div class="setting-row">
                <span>⚡ Auto-suggest</span>
                <span class="badge enabled">Enabled</span>
            </div>
        </div>

        <div class="toast" id="toast">✅ Colors updated!</div>
    </div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>

</html>
