name: Build Discord AI Assistant

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Show files
        run: |
          echo "=== Files in root ==="
          ls -la
          echo "=== Files in alhakatuextension ==="
          ls -la alhakatuextension/ || echo "Folder not found"

      - name: Inject secrets
        run: |
          cd alhakatuextension
          echo "Replacing Groq API key..."
          sed -i "s|YOUR_GROQ_API_KEY_HERE|${{ secrets.GROQ_API_KEY }}|g" popup.js
          
          echo "Replacing webhook URL..."
          sed -i "s|WEBHOOK_URL|${{ secrets.WEBHOOK_URL }}|g" background.js
          
          echo "✅ Secrets injected!"

      - name: Verify injection
        run: |
          cd alhakatuextension
          echo "=== popup.js first 3 lines ==="
          head -3 popup.js
          echo ""
          echo "=== background.js first 3 lines ==="
          head -3 background.js

      - name: Create ZIP
        run: |
          cd alhakatuextension
          zip -r ../discord-ai-assistant.zip . -x "*.git*" ".github/*" "*.md"
          cd ..
          echo "✅ ZIP created!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: discord-ai-assistant
          path: discord-ai-assistant.zip
